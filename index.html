<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ZisinRisuku Web Map</title>
    <link href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <button id="close-sidebar-btn">×</button>
        <div id="sidebar-content">
            <h2>詳細情報</h2>
            <p>大きな地震のマーク（赤いリングの点）をクリックすると、ここに詳細が表示されます。</p>
        </div>
    </div>

    <div id="map"></div>

    <div id="legend" class="hidden">
        <h4>地震リスクレベル</h4>
        <div class="legend-gradient"></div>
        <div class="legend-labels">
            <span>低</span>
            <span>中</span>
            <span>高</span>
        </div>
    </div>

    <div id="ui-container">
        <button id="analyze-btn">分析開始</button>
    </div>

	<div id="date-modal" class="hidden">
        <div class="modal-box">
            <h3 style="margin-top:0; color:#333;">分析期間の選択</h3>
            
            <div class="radio-group" style="margin-bottom: 15px; text-align: left;">
                <label style="display: block; margin-bottom: 10px; cursor: pointer;">
                    <input type="radio" name="period-type" value="month" checked> 過去1ヶ月（初期設定）
                </label>
                <label style="display: block; cursor: pointer;">
                    <input type="radio" name="period-type" value="custom"> 期間を指定する
                </label>
            </div>

            <div id="custom-dates" class="disabled">
                <input type="date" id="start-date" class="date-input"> 〜
                <input type="date" id="end-date" class="date-input"><br>
                <span class="note">※終了日を空欄にすると「現在」までになります</span>
            </div>

            <div class="modal-actions" style="margin-top: 20px;">
                <button id="cancel-date-btn">キャンセル</button>
                <button id="execute-btn">分析を開始</button>
            </div>
        </div>
    </div>
	
    <div id="analysis-overlay" class="hidden">
        <div class="analysis-box">
            <h2 id="analysis-status">データ解析中...</h2>
            <p id="analysis-time">--/--/-- --:--</p>
            <button id="skip-btn">スキップ</button>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>
    <script src="main.js"></script>
</body>
</html>
